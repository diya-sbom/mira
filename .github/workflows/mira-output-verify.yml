name: MIRA Output Verification

on:
  push:
  pull_request:

jobs:
  verify-output:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify protected output receipt
        run: python3 verify_output.py
